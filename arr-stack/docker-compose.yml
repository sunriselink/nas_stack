services:
  init:
    image: alpine
    entrypoint: install -d -o ${NAS_UID:?} -g ${NAS_GID:?} -m 770
    volumes:
      - ${PATH_TO_MEDIA:?}:/tmp/media
    command:
      - /tmp/media/audiobooks
      - /tmp/media/music
      - /tmp/media/downloads

  lidarr:
    image: lscr.io/linuxserver/lidarr:2.9.6
    container_name: arr_stack_lidarr
    restart: unless-stopped
    networks:
      - proxy
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
    volumes:
      - ${PATH_TO_ROOT:?}/arr-stack/lidarr:/config
      - ${PATH_TO_MEDIA:?}:/data
    depends_on:
      init:
        condition: service_completed_successfully
      jackett:
        condition: service_started
      qbittorrent:
        condition: service_started

  jackett:
    image: lscr.io/linuxserver/jackett:0.22.1665
    container_name: arr_stack_jackett
    restart: unless-stopped
    networks:
      - proxy
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
    volumes:
      - ${PATH_TO_ROOT:?}/arr-stack/jackett:/config

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.0.4
    container_name: arr_stack_qbittorrent
    restart: unless-stopped
    networks:
      - proxy
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
      WEBUI_PORT: 8080
      DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:2.23.1
    volumes:
      - ${PATH_TO_ROOT:?}/arr-stack/qbittorrent:/config
      - ${PATH_TO_MEDIA:?}/downloads:/data/downloads
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  proxy:
    external: true
